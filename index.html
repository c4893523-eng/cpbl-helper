        const getImgUrl = (item) => {
            // 1. Try content:encoded (with namespace fallback)
            let encodedTag = item.querySelector('encoded') || 
                             item.querySelector('content\\:encoded') || 
                             item.getElementsByTagName('encoded')[0] || 
                             item.getElementsByTagName('content:encoded')[0];
            if (encodedTag) {
                const text = encodedTag.textContent || encodedTag.text || '';
                if (text.trim().startsWith('http')) {
                    return text.trim();
                } else {
                    const match = text.match(/src="([^"]+)"/);
                    if (match) return match[1];
                }
            }

            // 2. Try enclosure
            const enclosure = item.querySelector('enclosure');
            if (enclosure && enclosure.getAttribute('type')?.startsWith('image')) {
                return enclosure.getAttribute('url');
            }

            // 3. Try media:content
            let mediaContent = item.getElementsByTagNameNS ? item.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'content')[0] : null;
            if (!mediaContent) {
                mediaContent = item.querySelector('content') || 
                               item.querySelector('media\\:content') || 
                               item.getElementsByTagName('media:content')[0];
            }
            if (mediaContent) {
                const url = mediaContent.getAttribute('url');
                if (url) return url;
            }

            // 4. Try media:thumbnail
            let mediaThumbnail = item.getElementsByTagNameNS ? item.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'thumbnail')[0] : null;
            if (!mediaThumbnail) {
                mediaThumbnail = item.querySelector('thumbnail') ||

            }

                const url = mediaThumbnail.getAttribute('url');
                if (url) return url;
            }

            return null;
        };

        };

        const Card = ({ title, icon, children, className="", action=null }) => (
            <div className={`bg-gray-800 rounded-xl shadow-lg border border-gray-700 overflow-hidden flex flex-col ${className}`}>
                <div className="bg-gray-750 px-4 py-3 border-b border-gray-700 flex items-center justify-between">
                    <div className="flex items-center gap-2">

        const Standings = () => {
            const [standings, setStandings] = useState(fallbackStandings);
            const [isSyncing, setIsSyncing] = useState(false);
            const [isFallback, setIsFallback] = useState(false);

            const syncStandings = async () => {
                setIsSyncing(true);
                setIsFallback(false);
                try {
                    let rebasData = null;

                    // 1. 首選：讀取 GitHub Actions 自動產生的本地端靜態檔案 (速度最快，永不被擋)
                    try {
                        // 使用加上時間戳的網址避免瀏覽器快取
                        const res = await fetch(`./standings.json?t=${new Date().getTime()}`);
                        if (res.ok) {
                            const data = await res.json();
                            if (data && data.data && Array.isArray(data.data)) {
                                rebasData = data.data;
                            }
                        }
                    } catch (e) {
                        console.log("Local standings.json not found or error, falling back", e);
                    }

                    if (rebasData) {
                        const parsed = rebasData.map(item => {
                            const teamName = item.team.name; // e.g. "味全龍" or "統一7-ELEVEn獅"
                            const w = item.wins;
                            const l = item.loses;
                            const d = item.draws;
                            let pct = item.PCT.toFixed(3).replace(/^0\./, '.'); // "0.581" -> ".581"
                            let gb = item.GB.toString();
                            
                            // Rebas 的 STRK 是數字，正數為連勝，負數為連敗
                            let streak = '-';
                            if (item.STRK > 0) streak = `W${item.STRK}`;
                            else if (item.STRK < 0) streak = `L${Math.abs(item.STRK)}`;

                            return {
                                team: teamName,
                                w: w.toString(),
                                l: l.toString(),
                                d: d.toString(),
                                pct: pct,
                                gb: gb,
                                streak: streak,
                                color: getTeamColor(teamName)
                            };
                        });
                        setStandings(parsed);
                    } else {
                        throw new Error("Local data not available yet");
                    }
                } catch (e) {
                    console.error("Real-time fetch failed, using updated accurate fallback data:", e);
                    setStandings([...fallbackStandings]);
                    setIsFallback(true);
                } finally {
                    setIsSyncing(false);
                }
            };

            useEffect(() => { syncStandings(); }, []);

            return (
                <Card 
                    title={
                        <span className="flex items-center">
                            即時例行賽戰績 (Live Sync)
                            {isFallback && <span className="text-red-400 text-xs ml-2 px-2 py-0.5 bg-red-900/50 rounded border border-red-500 font-normal shadow-sm animate-pulse">⚠ 目前顯示備援資料</span>}

                    icon="fa-trophy"
                    action={<button onClick={syncStandings} className={`text-gray-400 hover:text-white ${isSyncing ? 'animate-spin text-blue-400' : ''}`}><i className="fas fa-sync-alt"></i></button>}
                >
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left whitespace-nowrap">
                            <thead className="text-xs text-gray-400 uppercase bg-gray-700/50">
                                <tr>
                                    <th className="px-3 py-2 rounded-tl-lg">球隊</th>
                                    <th className="px-3 py-2 text-right">勝</th>
                                    <th className="px-3 py-2 text-right">敗</th>
                                    <th className="px-3 py-2 text-right">和</th>
                                    <th className="px-3 py-2 text-right">勝率</th>
                                    <th className="px-3 py-2 text-right">勝差</th>
                                    <th className="px-3 py-2 text-center rounded-tr-lg">近況</th>
                                </tr>
                            </thead>
                            <tbody>
                                {standings.map((row, idx) => (
                                    <tr key={idx} className="border-b border-gray-700/50 hover:bg-gray-750 transition-colors">
                                        <td className="px-3 py-2 font-medium">
                                            <div className="flex items-center gap-2">
                                                <span className={`w-3 h-3 rounded-full ${row.color}`}></span>
                                                {row.team}
                                            </div>
                                        </td>
                                        <td className="px-3 py-2 text-right">{row.w}</td>
                                        <td className="px-3 py-2 text-right">{row.l}</td>
                                        <td className="px-3 py-2 text-right">{row.d}</td>
                                        <td className="px-3 py-2 text-right font-bold text-blue-300">{row.pct}</td>
                                        <td className="px-3 py-2 text-right">{row.gb}</td>
                                        <td className="px-3 py-2 text-center">
                                            <span className={`px-2 py-0.5 rounded text-xs font-bold ${row.streak.includes('W') ? 'bg-red-900/50 text-red-400' : row.streak.includes('L') ? 'bg-green-900/50 text-green-400' : 'bg-gray-700 text-gray-300'}`}>
                                                {row.streak}
                                            </span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className="text-right text-xs text-gray-500 mt-3 flex items-center justify-end gap-1">
                        <i className="fas fa-database text-gray-600"></i> 更新出處：<a href="https://www.rebas.tw/" target="_blank" rel="noopener noreferrer" className="hover:text-blue-400 transition-colors">野球革命 Rebas</a>
                    </div>
                </Card>
            );
        };

        // --- Shared Weather Logic ---
        const stadiumsConfig = [
            { name: '台北大巨蛋', lat: 25.041, lon: 121.560 },
            { name: '天母棒球場', lat: 25.114, lon: 121.533 },
            { name: '新莊棒球場', lat: 25.040, lon: 121.448 },
            { name: '桃園棒球場', lat: 25.000, lon: 121.201 },
            { name: '洲際棒球場', lat: 24.200, lon: 120.685 },
            { name: '嘉市棒球場', lat: 23.481, lon: 120.463 },
            { name: '台南棒球場', lat: 22.978, lon: 120.205 },
            { name: '澄清湖棒球場', lat: 22.655, lon: 120.355 }
        ];

        let cachedWeather = null;
        let weatherFetchPromise = null;

        const fetchWeatherOnce = () => {
            if (cachedWeather) return Promise.resolve(cachedWeather);
            if (weatherFetchPromise) return weatherFetchPromise;

            weatherFetchPromise = Promise.all(stadiumsConfig.map(async (stadium) => {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${stadium.lat}&longitude=${stadium.lon}&current=temperature_2m,weather_code,precipitation&timezone=Asia%2FTaipei`);
                    const data = await res.json();
                    const wInfo = wmoWeatherCodeToIcon(data.current.weather_code);
                    return {
                        stadium: stadium.name,
                        temp: `${Math.round(data.current.temperature_2m)}°C`,
                        rain: `${data.current.precipitation}mm`,
                        desc: wInfo.desc,
                        icon: wInfo.icon
                    };
                } catch(e) {
                    return { stadium: stadium.name, temp: '--°C', rain: '--', desc: '無法取得', icon: 'fa-cloud text-gray-500' };
                }
            })).then(data => {
                cachedWeather = data;
                return data;
            });

            return weatherFetchPromise;
        };

        const useSharedWeather = () => {
            const [weather, setWeather] = useState([]);
            useEffect(() => {
                fetchWeatherOnce().then(data => setWeather(data));
            }, []);
            return weather;
        };
        // -----------------------------

        const Schedule = () => {
            const [activeTab, setActiveTab] = useState('thisWeek');
            const [schedule, setSchedule] = useState(fallbackSchedule);
            const [isSyncing, setIsSyncing] = useState(false);
            const [isFallback, setIsFallback] = useState(false);
            const weatherData = useSharedWeather();

            const syncSchedule = async () => {
                setIsSyncing(true);
                setIsFallback(false);
                try {
                    const fetchLocalSchedule = async () => {
                        try {
                            const nowHour = new Date().getHours();
                            // 在比賽主要時段 (下午 5 點到晚上 11 點) 優先透過 GAS 代理獲取秒級即時賽況
                            if (typeof GAS_TRAFFIC_URL !== 'undefined' && GAS_TRAFFIC_URL && nowHour >= 17 && nowHour <= 23) {
                                console.log("Fetching real-time schedule from GAS...");
                                const res = await fetch(`${GAS_TRAFFIC_URL}?action=schedule`);
                                if (res.ok) {
                                    const json = await res.json();
                                    if (json && Array.isArray(json.data)) return json.data;
                                }
                            }
                        } catch (e) {
                            console.log("GAS real-time fetch failed, falling back to local schedule.json", e);
                        }

                        try {
                            const res = await fetch(`./schedule.json?t=${new Date().getTime()}`);
                            if (res.ok) {
                                const json = await res.json();
                                if (json && Array.isArray(json.data)) return json.data;
                            }
                        } catch (e) {
                            console.log("Local schedule.json not found or error");
                        }
                        return [];
                    };
                    
                    const allData = await fetchLocalSchedule();
                    
                    if (allData.length === 0) {
                        throw new Error("All fetch attempts failed or returned empty data. CORS or Proxy block.");
                    }
                    
                    const now = new Date();
                    const dayOfWeek = now.getDay() || 7; // 1-7
                    const thisMonday = new Date(now);
                    thisMonday.setDate(now.getDate() - dayOfWeek + 1);
                    thisMonday.setHours(0, 0, 0, 0);
                    
                    const nextMonday = new Date(thisMonday);
                    nextMonday.setDate(thisMonday.getDate() + 7);
                    
                    const lastMonday = new Date(thisMonday);
                    lastMonday.setDate(thisMonday.getDate() - 7);
                    
                    const nextNextMonday = new Date(nextMonday);
                    nextNextMonday.setDate(nextMonday.getDate() + 7);
                    
                    const days = ['日', '一', '二', '三', '四', '五', '六'];
                    const parsedSchedule = { lastWeek: [], thisWeek: [], nextWeek: [] };
                    
                    allData.forEach(game => {
                        if (!game.info || !game.info.scheduled_start_at || !game.away || !game.home) return;
                        const gameDate = new Date(game.info.scheduled_start_at.replace(/-/g, '/'));
                        if (isNaN(gameDate)) return;
                        
                        let targetList = null;
                        if (gameDate >= lastMonday && gameDate < thisMonday) targetList = parsedSchedule.lastWeek;
                        else if (gameDate >= thisMonday && gameDate < nextMonday) targetList = parsedSchedule.thisWeek;
                        else if (gameDate >= nextMonday && gameDate < nextNextMonday) targetList = parsedSchedule.nextWeek;
                        
                        if (targetList) {
                            const mm = String(gameDate.getMonth() + 1).padStart(2, '0');
                            const dd = String(gameDate.getDate()).padStart(2, '0');
                            const dw = days[gameDate.getDay()];
                            const timeStr = game.info.scheduled_start_at.substring(11, 16);
                            
                            const awayTeam = game.away.team.replace('7-ELEVEn', '');
                            const homeTeam = game.home.team.replace('7-ELEVEn', '');
                            let stadium = game.info.location_abbr || game.info.location || '';
                            if (stadium === '大巨蛋' || stadium.includes('大巨蛋')) stadium = '大巨蛋';
                            else if (stadium.includes('天母')) stadium = '天母';
                            else if (stadium.includes('新莊')) stadium = '新莊';
                            else if (stadium.includes('桃園')) stadium = '桃園';
                            else if (stadium.includes('洲際')) stadium = '洲際';
                            else if (stadium.includes('台南')) stadium = '台南';
                            else if (stadium.includes('澄清湖')) stadium = '澄清湖';
                            else if (stadium.includes('嘉義市')) stadium = '嘉義市';
                            else if (stadium.includes('亞太')) stadium = '亞太';
                            
                            targetList.push({
                                date: `${mm}/${dd} (${dw})`,
                                time: timeStr,
                                away: awayTeam,
                                home: homeTeam,
                                stadium: stadium,
                                status: game.info.status || 'SCHEDULED',
                                awayScore: game.away.runs !== undefined ? game.away.runs : null,
                                homeScore: game.home.runs !== undefined ? game.home.runs : null,
                                inning: game.info.innings || null
                            });
                        }
                    });
                    
                    const sortGames = (a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time);
                    parsedSchedule.lastWeek.sort(sortGames);
                    parsedSchedule.thisWeek.sort(sortGames);
                    parsedSchedule.nextWeek.sort(sortGames);
                    
                    setSchedule(parsedSchedule);
                } catch (e) {
                    console.error("Schedule dynamic fetch failed completely:", e);
                    // Still show fallback if completely failed
                    setSchedule({...fallbackSchedule});
                    setIsFallback(true);
                } finally {
                    setIsSyncing(false);
                }
            };
            useEffect(() => { syncSchedule(); }, []);

            const getStadiumWeather = (stadiumName) => {
                if (!weatherData || weatherData.length === 0) return null;
                const mapping = {
                    '大巨蛋': '台北大巨蛋', '天母': '天母棒球場', '新莊': '新莊棒球場', 
                    '桃園': '桃園棒球場', '洲際': '洲際棒球場', '嘉義市': '嘉市棒球場',
                    '台南': '台南棒球場', '澄清湖': '澄清湖棒球場', '亞太': '台南棒球場'
                };
                const matchedName = mapping[stadiumName] || stadiumName;
                return weatherData.find(w => w.stadium.includes(matchedName)) || null;
            };

            return (
                <Card 
                    title={
                        <span className="flex items-center">
                            近期賽程
                            {isFallback && <span className="text-red-400 text-xs ml-2 px-2 py-0.5 bg-red-900/50 rounded border border-red-500 font-normal shadow-sm animate-pulse">⚠ 目前顯示備援資料</span>}
                        </span>
                    } 
                    icon="fa-calendar-days"
                    action={<button onClick={syncSchedule} className={`text-gray-400 hover:text-white ${isSyncing ? 'animate-spin text-blue-400' : ''}`}><i className="fas fa-sync-alt"></i></button>}
                >
                    <div className="flex bg-gray-900/50 rounded-lg p-1 mb-4 border border-gray-700/80">
                        <button onClick={() => setActiveTab('lastWeek')} className={`flex-1 text-sm py-1.5 rounded-md font-medium transition-colors ${activeTab === 'lastWeek' ? 'bg-gray-700 text-white shadow' : 'text-gray-400 hover:text-gray-200'}`}>上周賽程</button>

        const GAS_TRAFFIC_URL = "https://script.google.com/macros/s/AKfycbzRCNtsA_yR3LFKChXYLOV7Nh7Ejxw2ApiGQIx6M4g18UjfJwlm0gBU2fdjJ6Eb9Acn/exec"

        const TrafficCounter = () => {
            const [traffic, setTraffic] = useState({ daily: 0, weekly: 0, monthly: 0, total: 0 });
            const [status, setStatus] = useState('idle'); // idle, connecting, connected, error, mock

            useEffect(() => {
                const fetchTraffic = async () => {
                    if (GAS_TRAFFIC_URL) {
                        setStatus('connecting');
                        try {
                            const res = await fetch(`${GAS_TRAFFIC_URL}?action=hit`);
                            const result = await res.json();
                            if (result.success) {
                                setTraffic(result.data);
                                setStatus('connected');
                                return;
                            } else {
                                setStatus('error');
                            }
                        } catch (e) {
                            console.error("無法連線至 Google Traffic API，切換至模擬模式");
                            setStatus('error');
                        }
                    } else {
                        setStatus('mock');
                    }
                    
                    // 模擬數據邏輯 (Fallback)
                    const now = new Date();
                    const startOfYear = new Date(now.getFullYear(), 0, 0);
                    const dayOfYear = Math.floor((now - startOfYear) / 1000 / 60 / 60 / 24);
                    const baseTotal = 245800;
                    const hourMultiplier = now.getHours() * 15 + now.getMinutes() % 15;
                    
                    setTraffic({
                        daily: 350 + hourMultiplier,
                        weekly: 2100 + (now.getDay() || 7) * 350 + hourMultiplier,
                        monthly: 8500 + now.getDate() * 350 + hourMultiplier,
                        total: baseTotal + dayOfYear * 400 + hourMultiplier
                    });
                };

                fetchTraffic();
            }, []);

            const statusConfig = {
                connecting: { color: 'bg-yellow-500', text: '連線中...', icon: 'fa-circle-notch fa-spin' },
                connected: { color: 'bg-green-500', text: 'API 已連線', icon: 'fa-check-circle' },
                error: { color: 'bg-red-500', text: '連線異常', icon: 'fa-exclamation-triangle' },
                mock: { color: 'bg-blue-400', text: '模擬模式', icon: 'fa-info-circle' },
                idle: { color: 'bg-gray-500', text: '等待中', icon: 'fa-circle' }
            };

            const currentStatus = statusConfig[status] || statusConfig.idle;

            return (
                <Card 
                    title={status === 'connected' ? "網站使用流量統計 (實時)" : "網站使用流量計 (模擬)"} 
                    icon="fa-chart-line"

                                <i className={`fas ${currentStatus.icon} text-[9px]`}></i>
                                {currentStatus.text}
                            </span>
                        </div>
                    }
                >
                    <div className="grid grid-cols-2 gap-3">
                        <div className="bg-gray-700/40 p-3 rounded-lg border border-gray-600/50 flex flex-col items-center justify-center text-center shadow-inner relative overflow-hidden group">
                            <div className="absolute inset-0 bg-green-500/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                            <i className="fas fa-user-clock text-gray-500/30 absolute right-2 bottom-2 text-4xl"></i>
