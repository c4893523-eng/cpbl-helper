name: Auto Update CPBL Data

on:
  schedule:
    # 每天台灣時間凌晨 02:00 (UTC 18:00) 執行
    - cron: '0 18 * * *'
    # 每天台灣時間下午 05:00 到晚上 11:45 之間，每 15 分鐘自動執行一次 (中職賽事即時比分更新)
    # (台北時間 17:00 ~ 23:45 對應 UTC 09:00 ~ 15:45)
    - cron: '*/15 9-15 * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動觸發

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run data fetch script
        run: node scripts/update_data.js

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add schedule.json standings.json news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update CPBL data (schedule, standings, news)" && git push)
